name: Backfill Scraper
 
on:
  push:
    paths:
      - '.github/workflow-triggers/scraper_backfill.trigger'
  workflow_dispatch:
 
jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml python-dotenv anthropic

      - name: Run backfill scraper
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          API_BASE_URL: https://endsarslist-api.damidude.workers.dev
        run: python scraper_v5.py --backfill
 
